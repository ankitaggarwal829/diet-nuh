<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Under Construction</title>

    <link rel="stylesheet" href="../../styles.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f6fb;
            text-align: center;
        }

        .construction-container {
            max-width: 600px;
            padding: 40px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .construction-container h1 {
            font-size: 32px;
            color: rgb(17, 29, 94);
            margin-bottom: 15px;
        }

        .construction-container p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }

        .construction-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .home-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgb(17, 29, 94);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .home-btn:hover {
            background: #0055aa;
        }
    </style>
</head>

<body>

    <div class="construction-container">
        <div class="construction-icon">🚧</div>

        <h1>Page Under Construction</h1>

        <p>
            We are currently working on this page to bring you better content.
            Please check back soon!
        </p>

        <a href="/index.html" class="home-btn">Go Back Home</a>
    </div>

</body>
</html>
